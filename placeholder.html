<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>준비 중</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 3rem 2rem;
}

.wrap {
  text-align: center;
  max-width: 380px;
}

.icon {
  font-size: 3rem;
  margin-bottom: 1.25rem;
  display: block;
  opacity: 0.35;
}

.label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-bottom: 0.6rem;
}

.title {
  font-family: var(--display);
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: -0.02em;
  margin-bottom: 0.75rem;
}

.desc {
  font-family: var(--serif);
  font-size: 0.9rem;
  color: var(--ink-3);
  line-height: 1.85;
  font-weight: 400;
}

.rule {
  width: 40px;
  height: 2px;
  background: var(--rule);
  margin: 1.5rem auto;
}
</style>
</head>
<body>
  <div class="wrap">
    <span class="icon">🔬</span>
    <div class="label">Coming Soon</div>
    <div class="title">준비 중입니다</div>
    <div class="rule"></div>
    <p class="desc">
      이 페이지는 현재 준비 중입니다.<br>
      강의 일정에 맞춰 업데이트될 예정입니다.
    </p>
  </div>
</body>
</html>
